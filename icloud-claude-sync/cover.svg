<svg xmlns="http://www.w3.org/2000/svg" width="960" height="640" viewBox="0 0 960 640" font-family="'SF Pro Display', 'Helvetica Neue', sans-serif">

  <!-- Background -->
  <rect width="960" height="640" fill="#ffffff"/>

  <!-- Top label -->
  <text x="480" y="62" text-anchor="middle" font-size="11" font-weight="600" fill="#aaaaaa" font-family="'SF Pro Text', sans-serif" letter-spacing="1.5">CLAUDE CODE / ICLOUD / MULTI-DEVICE SETUP</text>

  <!-- Main title -->
  <text x="480" y="118" text-anchor="middle" font-size="36" font-weight="700" fill="#111111" letter-spacing="-1">Sync Claude Code Across Macs</text>
  <text x="480" y="152" text-anchor="middle" font-size="16" fill="#777777" font-family="'SF Pro Text', sans-serif">One symlink. Zero manual steps. Always in sync.</text>

  <!-- Divider -->
  <line x1="60" y1="175" x2="900" y2="175" stroke="#eeeeee" stroke-width="1"/>

  <!-- Left box: Home Mac -->
  <rect x="60" y="198" width="245" height="220" rx="10" fill="#f7f7f7" stroke="#e0e0e0" stroke-width="1"/>
  <rect x="60" y="198" width="245" height="6" rx="4" fill="#333333"/>
  <text x="183" y="236" text-anchor="middle" font-size="13" font-weight="700" fill="#111111" font-family="'SF Mono', 'Fira Mono', monospace">Home Mac</text>

  <text x="84" y="268" font-size="11" fill="#888888" font-family="'SF Mono', monospace">~/.claude</text>
  <text x="180" y="268" font-size="11" fill="#aaaaaa" font-family="'SF Mono', monospace">→ symlink</text>

  <text x="84" y="296" font-size="11" fill="#555555" font-family="'SF Mono', monospace">~/Documents/</text>
  <text x="84" y="312" font-size="11" fill="#111111" font-weight="600" font-family="'SF Mono', monospace">  claude-config/</text>

  <line x1="84" y1="326" x2="285" y2="326" stroke="#eeeeee" stroke-width="1"/>

  <text x="84" y="346" font-size="10.5" fill="#333333" font-family="'SF Pro Text', sans-serif">CLAUDE.md  — AI instructions</text>
  <text x="84" y="363" font-size="10.5" fill="#333333" font-family="'SF Pro Text', sans-serif">settings.json  — model, plugins</text>
  <text x="84" y="380" font-size="10.5" fill="#333333" font-family="'SF Pro Text', sans-serif">settings.local.json  — allowlist</text>
  <text x="84" y="397" font-size="10.5" fill="#333333" font-family="'SF Pro Text', sans-serif">plugins/  — installed plugins</text>

  <!-- Arrow right to iCloud -->
  <line x1="316" y1="308" x2="386" y2="308" stroke="#cccccc" stroke-width="1.5" stroke-dasharray="5,3"/>
  <polygon points="386,303 396,308 386,313" fill="#cccccc"/>

  <!-- Center: iCloud -->
  <rect x="400" y="228" width="160" height="160" rx="80" fill="#f0f7ff" stroke="#b8d4f0" stroke-width="1.5"/>
  <!-- Cloud shape via text symbol -->
  <text x="480" y="290" text-anchor="middle" font-size="42" fill="#4a90d9">☁</text>
  <text x="480" y="330" text-anchor="middle" font-size="13" font-weight="700" fill="#2d6fa8" font-family="'SF Pro Text', sans-serif">iCloud Drive</text>
  <text x="480" y="348" text-anchor="middle" font-size="10" fill="#6a9ec8" font-family="'SF Pro Text', sans-serif">Documents folder</text>
  <text x="480" y="366" text-anchor="middle" font-size="10" fill="#6a9ec8" font-family="'SF Pro Text', sans-serif">auto-synced</text>

  <!-- Arrow right to Office Mac -->
  <line x1="564" y1="308" x2="634" y2="308" stroke="#cccccc" stroke-width="1.5" stroke-dasharray="5,3"/>
  <polygon points="634,303 644,308 634,313" fill="#cccccc"/>

  <!-- Right box: Office Mac -->
  <rect x="648" y="198" width="245" height="220" rx="10" fill="#f7f7f7" stroke="#e0e0e0" stroke-width="1"/>
  <rect x="648" y="198" width="245" height="6" rx="4" fill="#333333"/>
  <text x="770" y="236" text-anchor="middle" font-size="13" font-weight="700" fill="#111111" font-family="'SF Mono', 'Fira Mono', monospace">Office Mac</text>

  <text x="672" y="268" font-size="11" fill="#888888" font-family="'SF Mono', monospace">~/.claude</text>
  <text x="768" y="268" font-size="11" fill="#aaaaaa" font-family="'SF Mono', monospace">→ symlink</text>

  <text x="672" y="296" font-size="11" fill="#555555" font-family="'SF Mono', monospace">~/Documents/</text>
  <text x="672" y="312" font-size="11" fill="#111111" font-weight="600" font-family="'SF Mono', monospace">  claude-config/</text>

  <line x1="672" y1="326" x2="873" y2="326" stroke="#eeeeee" stroke-width="1"/>

  <text x="672" y="346" font-size="10.5" fill="#333333" font-family="'SF Pro Text', sans-serif">CLAUDE.md  — identical</text>
  <text x="672" y="363" font-size="10.5" fill="#333333" font-family="'SF Pro Text', sans-serif">settings.json  — identical</text>
  <text x="672" y="380" font-size="10.5" fill="#333333" font-family="'SF Pro Text', sans-serif">settings.local.json  — identical</text>
  <text x="672" y="397" font-size="10.5" fill="#333333" font-family="'SF Pro Text', sans-serif">plugins/  — identical</text>

  <!-- Setup command box -->
  <rect x="60" y="445" width="840" height="82" rx="8" fill="#f9f9f9" stroke="#e8e8e8" stroke-width="1"/>
  <rect x="60" y="445" width="840" height="5" rx="3" fill="#111111"/>
  <text x="84" y="475" font-size="11" fill="#aaaaaa" font-family="'SF Mono', monospace"># Run once on each Mac after iCloud syncs the folder</text>
  <text x="84" y="497" font-size="12.5" font-weight="600" fill="#111111" font-family="'SF Mono', monospace">ln -s ~/Documents/claude-config ~/.claude</text>

  <!-- Footer -->
  <line x1="60" y1="554" x2="900" y2="554" stroke="#eeeeee" stroke-width="1"/>
  <text x="480" y="580" text-anchor="middle" font-size="11" fill="#999999" font-family="'SF Pro Text', sans-serif">Move ~/.claude to iCloud Documents. Create a symlink. Done — Claude sees nothing different.</text>
  <text x="480" y="600" text-anchor="middle" font-size="10" fill="#cccccc" font-family="'SF Pro Text', sans-serif">No git. No manual sync. No configuration drift.</text>

</svg>
