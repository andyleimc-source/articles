tests:
- description: enterprise-ai-landing-jobs（Jobs 模式 · 企业 AI 落地）
  vars:
    article: '> 本文以 Steve Jobs 视角写，基于公开言论与传记推断，非本人观点。



      那位杭州的老板，你那段录音我听完了。


      你说你们做跨境仓储，国内杭州、海外荷兰，正在做 AI 基建，想从"顶层设计"到"落地"找几个有经验的顾问聊聊。


      我想说一件让你不舒服的话——你说出"顶层设计"这四个字的那一秒，你就已经输了。


      不是因为这四个字本身有什么错。是因为，当一个公司的老板开始用"顶层设计"这种词描述他要做的事的时候，意味着他已经把问题交给了 PPT，而不是交给了现实。


      我做了三十五年产品。我见过太多公司在这一刻死掉。不是死于技术，是死于这种语言。


      ## 你不是要 AI


      你在荷兰有仓，在杭州有仓。中间隔着海运、清关、最后一公里、退货、关税、SKU 爆仓、欧洲 VAT。


      每一段都有人在赔钱。每一段都有人在熬夜。每一段都有一个员工在 Excel 里手动对账，对到凌晨两点。


      你要的不是 AI。你要的是——这些钱不要再赔了。


      这两件事听起来差不多，差得很远。


      如果你脑子里挂的是"我们要做 AI"，你会做出来一个看板。看板上有十二种颜色，二十个指标，三个大屏。董事会很满意，员工继续熬夜对账。


      如果你脑子里挂的是"这次荷兰仓爆仓让我们多赔了四十万欧元，下次不能再来一次"，你会做出来另一个东西。它可能很丑。它可能只是一个每天早上八点发到三个人手机上的预警。它会救你的命。


      这两条路从第一天就分岔了。你站在岔路口，正在用"AI 顶层设计"这五个字告诉我——你想走第一条。


      不要走第一条。


      ## 选一件事。砍掉其它


      1997 年我回 Apple 的时候，Apple 有三百五十个产品。我画了一个 2x2 的方格。横轴：消费者、专业用户。纵轴：台式、笔记本。四个格子。四个产品。


      那一年砍掉了三百四十六个产品线。所有人都说我疯了。三年后这家公司活了过来。


      聚焦不是对你要做的事说 Yes。聚焦是对其它一百件好主意说 No。


      回到你的仓库。你现在脑子里大概有十几件 AI 能做的事——智能补货、动态定价、清关单据自动化、退货分拣视觉识别、客服机器人、需求预测、路径优化、SKU 聚类、ESG 报告生成。


      每一件都是好主意。每一件都有顾问能给你画一张架构图。


      但你只能做一件。


      不是"只能先做一件"。是只能做一件——做完那一件，再决定下一件。这之间不是路线图的关系，是死人和活人的关系。


      哪一件？回答这一个问题就够了：**过去十二个月，哪一个错误最贵？**


      是荷兰仓爆仓一次赔四十万欧元？是清关延误导致一整批货错过黑五？是退货分拣错把 A 客户的东西发回给 B 客户引发投诉潮？是 SKU 死库存压住八百万现金流？


      去找那个最贵的错误。把 AI 用在那一件事上。


      其它的，全部砍掉。砍到你的高管来跟你拍桌子说"老板我们不能不做这个"——这时候你才知道你聚焦对了。


      ## The Whole Widget


      物流的本质：你的体验链条多长，你的控制力就有多脆弱。


      杭州的货——一辆卡车——一个港口——一艘船——荷兰的港口——一个清关代理——一辆卡车——荷兰仓——一个本地配送商——客户家门口。


      九段。九段里有几段在你手上？


      你做 AI 之前，先回答这个。


      残酷的事实：哪一段不在你手上，AI 就在那一段失效。


      你想做爆仓预测？预测出来了，调货指令发出去，海运排不上船，预测白做。你想做清关自动化？关键节点数据在代理那里，他一天给你回一次邮件，自动化没有上游数据。你想做退货分拣视觉识别？识别完了发现你的 WMS 系统是 2014 年那家厂商写的，根本接不进'
- description: introduce-superpowers（已知爆款 11686 阅读 · 基线对照）
  vars:
    article: '大概1个月前，我在用 Claude Code 写一个功能，写完跑起来，不对。让它改，改完还是不对。再让它改，改出了新问题。


      那天晚上我前后改了六次，最终把整个文件推倒重来。


      如果你也用 Claude Code，这个场景你一定不陌生。**AI 动作很快，但方向一旦跑偏，追起来比自己写还累。**



      ### 一、Plan Mode 是进步，但还不够


      后来我发现了 Plan Mode（`/plan`）。


      打开之后，Claude Code 在动手之前会先生成一份计划，你确认之后它才执行。这个设计很聪明——它强迫 AI 先"想清楚"再"动手"，而不是一边想一边写，越写越偏。


      返工确实少了。但没有消失。


      问题出在执行阶段。Plan Mode 帮你把计划定了下来，但执行过程中没有约束——AI 随时可能"临时发挥"，悄悄偏离计划。等你发现，已经改了一大片了。


      我需要更彻底的东西。



      ### 二、Superpowers 是什么



      *Superpowers 的 GitHub 主页，截至目前已有 137k stars*


      有一天刷 Twitter，看到有人提到一个叫 **Superpowers** 的 Claude Code 插件框架。点进去看了一眼，GitHub 上 137k stars，obra 维护，最新版本 v5.0.7。


      项目描述只有一句话：**"An agile skills framework & software development methodology that works."**


      这句话听起来有点大，但我还是装了。


      Superpowers 的核心概念是 **skills**——一套预定义的工作流指令，告诉 Claude Code 在特定场景下应该怎么做事。不是让 AI 更聪明，而是给 AI 套上一套可靠的工作方法论。


      装完之后，Claude Code 每次启动都会自动加载这套方法论，在合适的时机主动触发对应的 skill。



      ### 三、14 个 Skills，覆盖开发全流程


      Superpowers v5.0.7 包含 14 个 skills，我按使用阶段分成四组来介绍。



      #### 🧠 规划阶段


      **`brainstorming`**


      触发时机：你有一个模糊的想法，还没想清楚怎么做。


      这个 skill 强制 Claude Code 在动手之前，先和你来回确认几轮——目标是什么？有什么约束？有哪几种方案？各自的取舍是什么？


      没用它之前，我经常说一句"帮我做 X"，AI 就开干了，干完发现和我想的完全两回事。用了之后，在真正开始写代码之前，我和 AI 之间已经达成了共识。


      **预计收益：减少"做完发现理解错了"型返工，节省 30-50% 总时间。**



      **`writing-plans`**


      触发时机：需求已经明确，开始把它变成可执行的步骤。


      这个 skill 把需求拆解成一份详细的实施计划，每一步都有明确的目标和验收标准，存成文档。这份计划是后续所有执行的依据。


      关键点在于：**计划是写下来的，不是停留在对话里的。** 对话会被遗忘，文档不会。


      **预计收益：执行阶段的"临时发挥"显著减少。**



      #### ⚙️ 执行阶段


      **`executing-plans`**


      触发时机：有了 writing-plans 生成的计划文档，开始执行。


      这个 skill 让 Claude Code 严格按照计划文档一步步走，每完成一步都会回来确认，而不是一口气冲到底。**执行过程有检查点，跑偏了能及'
- description: pensieve-mcp-screen-memory（中等 3339 阅读 · 验证能否超越）
  vars:
    article: '我前几天和同事讨论一个案例页面，结论挺重要，截图我没存。今天想翻回去看，记不清是周二还是周三，浏览器历史里翻了十分钟也没找到——那个页面我只停留了三十秒。


      这种事每周都在发生。前天看过的图、上周读过的文章、半个月前调过的命令，统统在脑子里溶解。我们在屏幕前的每一秒都在产生信息，却没有任何东西替我们记住。


      所以我做了件事：让 Mac **每隔几秒自动截一次屏，OCR 入库，可搜索**；然后写了个 MCP 让 Claude Code 直接调它。现在我在终端里随便问一句"我今天下午都在忙啥"，它就替我把一下午的屏幕翻一遍，给我一段总结。


      这篇不是装机教程——想装的话最后有 GitHub 链接，一行命令搞定。这篇想讲的是**用起来是什么感觉**，以及**为什么我觉得这件事值得做**。



      ## 一、它长这样


      底层是开源项目 [arkohut/pensieve](https://github.com/arkohut/pensieve)（不是我做的，致谢作者）。装好之后它就在后台默默截图、OCR、建索引，一切都在本地，数据不出机器。



      它自带一个 Web UI 能搜，但我几乎不用。我把它包了一层 MCP，挂到 Claude Code 上——这才是真正改变体验的地方。




      ## 二、用起来是什么感觉


      **场景一**：周五下午我想交个周报，但根本不记得这周干了啥。


      > 我："这周我每天分别在忙什么？用 pensieve 查屏幕历史。"

      >

      > Claude：（拉了过去 5 天每小时的应用分布、窗口标题）"周一早上你在调试 pdhunter 的 Go 编译；下午切到了和 supabase 计费相关的浏览器调研。周二一整天泡在 Pensieve 部署……"


      我从来没主动记过这些。但屏幕替我记了，Claude 替我读了。


      **场景二**：我隐约记得上周看过一篇讲"独立开发者怎么收钱"的 GitHub 仓，没收藏，搜不出来了。


      > 我："上周看过的一个 GitHub 项目，关于独立开发者赚钱的，帮我找回来。"

      >

      > Claude：（搜到一张截图）"是 [loonggg/DevMoneySharing](https://github.com/loonggg/DevMoneySharing)，你周六晚上在 Chrome 里看的。"


      直接命中。屏幕历史是比浏览器历史靠谱的检索源——浏览器只记 URL，屏幕记**你真的看了什么**。


      **场景三**：和家人吃饭前我会让它暂停录屏；吃完回来再恢复。一句话搞定，不用点开任何 app。



      ## 三、为什么不用现成的方案


      我评估过几个：


      - **ScreenMemory**（Mac App Store 上 ~¥200）——闭源、不能自己加 MCP。

      - **Rem**——开源免费，但功能朴素，没有 API。

      - **Screenpipe**——生态最活跃，但商业版 $400，社区版自编译麻烦。


      Pensieve 的杀手锏是**有 REST API**。这意味着我可以把它接到 Claude Code、接到我自己写的小工具、接到任何未来想接的地方。一个能被脚本访问的屏幕记忆系统，价值不是线性的。



      ## 四、关于隐私


      这是我最在意的部分。屏幕里什么都有：聊天、密码框、银行流水、家里的照片。


      所以我的红线是：


      - **默认全本地**——OCR 用的是开源模型，跑在你自己机器上，不调任何云 API

      - **不开 VLM**（视觉模型）——OCR 已经能搜到 90% 的内容；多看一眼图、把截图发到云上的'
