<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 620">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&amp;display=swap');
      text { font-family: 'JetBrains Mono', 'Noto Sans SC', 'PingFang SC', sans-serif; }
    </style>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22d3ee"/>
    </marker>
    <marker id="arrow-slate" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/>
    </marker>
  </defs>

  <rect width="100%" height="100%" fill="#0f172a"/>
  <rect width="100%" height="100%" fill="url(#grid)"/>

  <!-- Title -->
  <text x="30" y="40" fill="white" font-size="18" font-weight="700">CLAUDE.md 三层布局</text>
  <text x="30" y="60" fill="#94a3b8" font-size="11">启动时向上 walk · 子目录懒加载</text>

  <!-- Layer 1: Global -->
  <rect x="100" y="110" width="800" height="110" rx="10" fill="#0f172a"/>
  <rect x="100" y="110" width="800" height="110" rx="10" fill="rgba(120,53,15,0.2)" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="8,4"/>
  <text x="120" y="135" fill="#fbbf24" font-size="11" font-weight="600">第一层 · 全局偏好（所有项目通用）</text>
  <rect x="140" y="150" width="720" height="55" rx="6" fill="#0f172a"/>
  <rect x="140" y="150" width="720" height="55" rx="6" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="500" y="172" fill="white" font-size="13" font-weight="600" text-anchor="middle">~/.claude/CLAUDE.md</text>
  <text x="500" y="192" fill="#cbd5e1" font-size="10" text-anchor="middle">身份 · 协作偏好 · 语言习惯 · 安全红线 · 启动时永远加载</text>

  <!-- Layer 2: Project -->
  <rect x="100" y="250" width="800" height="110" rx="10" fill="#0f172a"/>
  <rect x="100" y="250" width="800" height="110" rx="10" fill="rgba(8,51,68,0.25)" stroke="#22d3ee" stroke-width="1.5" stroke-dasharray="8,4"/>
  <text x="120" y="275" fill="#22d3ee" font-size="11" font-weight="600">第二层 · 项目根目录（本项目专属）</text>
  <rect x="140" y="290" width="720" height="55" rx="6" fill="#0f172a"/>
  <rect x="140" y="290" width="720" height="55" rx="6" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="500" y="312" fill="white" font-size="13" font-weight="600" text-anchor="middle">/project/CLAUDE.md</text>
  <text x="500" y="332" fill="#cbd5e1" font-size="10" text-anchor="middle">项目目标 · 架构 · 硬约束 · 索引到 plan/progress/decision/bug/handoff</text>

  <!-- Layer 3: Subdirectory (lazy) -->
  <rect x="100" y="390" width="800" height="140" rx="10" fill="#0f172a"/>
  <rect x="100" y="390" width="800" height="140" rx="10" fill="rgba(30,41,59,0.4)" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="8,4"/>
  <text x="120" y="415" fill="#94a3b8" font-size="11" font-weight="600">第三层 · 子目录（按模块划分 · 懒加载）</text>

  <rect x="140" y="435" width="220" height="75" rx="6" fill="#0f172a"/>
  <rect x="140" y="435" width="220" height="75" rx="6" fill="rgba(30,41,59,0.5)" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="250" y="460" fill="white" font-size="11" font-weight="600" text-anchor="middle">/frontend/CLAUDE.md</text>
  <text x="250" y="480" fill="#cbd5e1" font-size="9" text-anchor="middle">前端专属规则</text>
  <text x="250" y="498" fill="#94a3b8" font-size="8" text-anchor="middle">只在读前端文件时加载</text>

  <rect x="390" y="435" width="220" height="75" rx="6" fill="#0f172a"/>
  <rect x="390" y="435" width="220" height="75" rx="6" fill="rgba(30,41,59,0.5)" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="500" y="460" fill="white" font-size="11" font-weight="600" text-anchor="middle">/backend/CLAUDE.md</text>
  <text x="500" y="480" fill="#cbd5e1" font-size="9" text-anchor="middle">后端专属规则</text>
  <text x="500" y="498" fill="#94a3b8" font-size="8" text-anchor="middle">只在读后端文件时加载</text>

  <rect x="640" y="435" width="220" height="75" rx="6" fill="#0f172a"/>
  <rect x="640" y="435" width="220" height="75" rx="6" fill="rgba(30,41,59,0.5)" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="750" y="460" fill="white" font-size="11" font-weight="600" text-anchor="middle">/db/CLAUDE.md</text>
  <text x="750" y="480" fill="#cbd5e1" font-size="9" text-anchor="middle">数据层专属规则</text>
  <text x="750" y="498" fill="#94a3b8" font-size="8" text-anchor="middle">只在读 db 文件时加载</text>

  <!-- Walk-up indicator -->
  <text x="950" y="320" fill="#22d3ee" font-size="10" font-weight="600" text-anchor="end" transform="rotate(-90, 950, 320)">← 启动时 Claude 从 cwd 向上 walk，合并所有 CLAUDE.md</text>

  <!-- Footer note -->
  <text x="500" y="575" fill="#94a3b8" font-size="10" text-anchor="middle" font-style="italic">黄金法则：每一层 CLAUDE.md 都控制在 200 行以内 · 超过则拆到 .claude/rules/</text>
</svg>
