<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 700">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&amp;display=swap');
      text { font-family: 'JetBrains Mono', 'Noto Sans SC', 'PingFang SC', sans-serif; }
    </style>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <marker id="arrow-cyan" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22d3ee"/>
    </marker>
  </defs>

  <rect width="100%" height="100%" fill="#0f172a"/>
  <rect width="100%" height="100%" fill="url(#grid)"/>

  <!-- Title -->
  <text x="30" y="40" fill="white" font-size="18" font-weight="700">六文件协作地图</text>
  <text x="30" y="60" fill="#94a3b8" font-size="11" font-weight="400">Claude Code 项目文档体系 · 轻量骨架</text>

  <!-- Center: Claude -->
  <circle cx="500" cy="370" r="70" fill="#0f172a"/>
  <circle cx="500" cy="370" r="70" fill="rgba(59, 130, 246, 0.3)" stroke="#60a5fa" stroke-width="2"/>
  <text x="500" y="365" fill="white" font-size="14" font-weight="700" text-anchor="middle">Claude</text>
  <text x="500" y="385" fill="#cbd5e1" font-size="10" text-anchor="middle">（新会话 / subagent）</text>
  <text x="500" y="405" fill="#94a3b8" font-size="9" text-anchor="middle">每次醒来都是空白</text>

  <!-- Arrows from files to center (drawn first, then masked by boxes) -->
  <!-- CLAUDE.md top-left -->
  <line x1="210" y1="150" x2="445" y2="335" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrow-cyan)" opacity="0.7"/>
  <!-- plan.md top-center -->
  <line x1="500" y1="160" x2="500" y2="295" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrow)" opacity="0.6"/>
  <!-- progress.md top-right -->
  <line x1="790" y1="150" x2="555" y2="335" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)" opacity="0.6"/>
  <!-- decision.md bottom-left -->
  <line x1="210" y1="580" x2="445" y2="410" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrow)" opacity="0.6"/>
  <!-- bug.md bottom-center -->
  <line x1="500" y1="580" x2="500" y2="445" stroke="#fb7185" stroke-width="1.5" marker-end="url(#arrow)" opacity="0.6"/>
  <!-- handoff.md bottom-right -->
  <line x1="790" y1="580" x2="555" y2="410" stroke="#fbbf24" stroke-width="1.5" marker-end="url(#arrow)" opacity="0.6"/>

  <!-- CLAUDE.md top-left -->
  <rect x="100" y="110" width="220" height="80" rx="6" fill="#0f172a"/>
  <rect x="100" y="110" width="220" height="80" rx="6" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="210" y="135" fill="white" font-size="13" font-weight="700" text-anchor="middle">CLAUDE.md</text>
  <text x="210" y="155" fill="#cbd5e1" font-size="10" text-anchor="middle">项目说明书 + 硬约束 + 索引</text>
  <text x="210" y="175" fill="#94a3b8" font-size="9" text-anchor="middle">更新时机：架构/约束变了</text>

  <!-- plan.md top-center -->
  <rect x="390" y="110" width="220" height="80" rx="6" fill="#0f172a"/>
  <rect x="390" y="110" width="220" height="80" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="500" y="135" fill="white" font-size="13" font-weight="700" text-anchor="middle">plan.md</text>
  <text x="500" y="155" fill="#cbd5e1" font-size="10" text-anchor="middle">当前目标 · 里程碑 · 勾选项</text>
  <text x="500" y="175" fill="#94a3b8" font-size="9" text-anchor="middle">更新时机：新任务 / scope 变化</text>

  <!-- progress.md top-right -->
  <rect x="680" y="110" width="220" height="80" rx="6" fill="#0f172a"/>
  <rect x="680" y="110" width="220" height="80" rx="6" fill="rgba(30,41,59,0.5)" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="790" y="135" fill="white" font-size="13" font-weight="700" text-anchor="middle">progress.md</text>
  <text x="790" y="155" fill="#cbd5e1" font-size="10" text-anchor="middle">流水账 · 日期倒序</text>
  <text x="790" y="175" fill="#94a3b8" font-size="9" text-anchor="middle">更新时机：完成勾选项</text>

  <!-- decision.md bottom-left -->
  <rect x="100" y="550" width="220" height="80" rx="6" fill="#0f172a"/>
  <rect x="100" y="550" width="220" height="80" rx="6" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="210" y="575" fill="white" font-size="13" font-weight="700" text-anchor="middle">decision.md</text>
  <text x="210" y="595" fill="#cbd5e1" font-size="10" text-anchor="middle">架构/选型决策 · Why + 备选</text>
  <text x="210" y="615" fill="#94a3b8" font-size="9" text-anchor="middle">升级路径：docs/adr/</text>

  <!-- bug.md bottom-center -->
  <rect x="390" y="550" width="220" height="80" rx="6" fill="#0f172a"/>
  <rect x="390" y="550" width="220" height="80" rx="6" fill="rgba(136,19,55,0.4)" stroke="#fb7185" stroke-width="1.5"/>
  <text x="500" y="575" fill="white" font-size="13" font-weight="700" text-anchor="middle">bug.md</text>
  <text x="500" y="595" fill="#cbd5e1" font-size="10" text-anchor="middle">已知问题 · OPEN / FIXED</text>
  <text x="500" y="615" fill="#94a3b8" font-size="9" text-anchor="middle">退役时机：接入 issue tracker</text>

  <!-- handoff.md bottom-right -->
  <rect x="680" y="550" width="220" height="80" rx="6" fill="#0f172a"/>
  <rect x="680" y="550" width="220" height="80" rx="6" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="790" y="575" fill="white" font-size="13" font-weight="700" text-anchor="middle">handoff.md</text>
  <text x="790" y="595" fill="#cbd5e1" font-size="10" text-anchor="middle">下一轮的快照 · 接棒点</text>
  <text x="790" y="615" fill="#94a3b8" font-size="9" text-anchor="middle">更新时机：会话结束前</text>

  <!-- Legend bottom -->
  <text x="500" y="675" fill="#94a3b8" font-size="10" text-anchor="middle" font-style="italic">六个文件共同构成 Claude 的"皮册"——它失忆，文档不失忆</text>
</svg>
